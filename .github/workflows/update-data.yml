name: Update market data

on:
  schedule:
    - cron: "20 22 * * 1-5"   # weekdays ~5:20pm ET, after US market close
  workflow_dispatch:           # allows manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch market data
        run: python3 fetch_data.py

      - name: Commit data.json
        run: |
          git config user.name "data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update market data"
          git push
